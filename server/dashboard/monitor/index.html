  <script>var monitorId=new URLSearchParams(location.search).get('id');if(!monitorId)location.href='/dashboard';function loadDetail(){var t=localStorage.getItem('token');fetch('/api/monitors/'+monitorId,{headers:{'Authorization':'Bearer '+t}}).then(r=>r.json()).then(m=>{document.getElementById('mon-name').textContent=m.name;document.getElementById('mon-url').textContent=m.url;document.getElementById('mon-status').textContent=m.status;document.getElementById('mon-status').style.color=m.status==='up'?'#00e5a0':'#ff4757';document.getElementById('mon-response').textContent=m.avg_response_ms+'ms';document.getElementById('mon-interval').textContent='Every '+m.interval_seconds+'s'});fetch('/api/monitors/'+monitorId+'/checks').then(r=>r.json()).then(checks=>{var el=document.getElementById('checks-list');if(!checks.length){el.innerHTML='<p style=color:var(--colors-muted)>No checks yet</p>';return}var maxMs=Math.max(...checks.map(c=>c.response_ms||0),1);el.innerHTML=checks.slice(0,50).map(c=>'<div class=nyx-p_check-row><span class='+(c.status==='up'?'nyx-p_check-up':'nyx-p_check-down')+'>'+c.status_code+'</span><span>'+c.response_ms+'ms</span><span style=color:var(--colors-muted);font-size:0.8rem>'+(c.created_at||'')+'</span></div>').join('')});fetch('/api/monitors/'+monitorId+'/alerts',{headers:{'Authorization':'Bearer '+t}}).then(r=>r.json()).then(alerts=>{var el=document.getElementById('alerts-list');if(!alerts||!alerts.length){el.innerHTML='<p style=color:var(--colors-muted)>No alerts configured</p>';return}el.innerHTML=alerts.map(a=>'<div class=nyx-p_check-row><span>'+a.type+'</span><span>'+a.target+'</span><button onclick=deleteAlert('+a.id+') class=nyx-p_btn-delete>✕</button></div>').join('')})}function addAlert(){var t=localStorage.getItem('token');var target=document.getElementById('alert-target').value;if(!target)return;fetch('/api/monitors/'+monitorId+'/alerts',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({type:'email',target:target})}).then(r=>{if(r.ok){document.getElementById('alert-target').value='';loadDetail()}else r.json().then(d=>alert(d.error))})}function deleteAlert(id){var t=localStorage.getItem('token');fetch('/api/alerts/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+t}}).then(()=>loadDetail())}document.addEventListener('DOMContentLoaded',loadDetail)</script>
